<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Confirmed | SvetArt Beauty Studio</title>
    <meta
      name="description"
      content="Thank you for booking with SvetArt Beauty Studio. Your appointment is confirmed."
    />
    <style>
      :root {
        --bg: #f7efeb;
        --bg-accent: #f1e2dc;
        --text: #2f2725;
        --muted: #6f625e;
        --rose: #c88f8f;
        --rose-soft: #e7cdcd;
        --card: rgba(255, 255, 255, 0.72);
        --border: rgba(200, 143, 143, 0.2);
        --shadow: 0 24px 50px rgba(47, 39, 37, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 12% 18%, rgba(200, 143, 143, 0.22) 0%, transparent 42%),
          radial-gradient(circle at 88% 84%, rgba(231, 205, 205, 0.5) 0%, transparent 48%),
          linear-gradient(145deg, var(--bg) 0%, var(--bg-accent) 100%);
      }

      .card {
        width: min(640px, 100%);
        border-radius: 28px;
        border: 1px solid var(--border);
        background: var(--card);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
        padding: clamp(28px, 5vw, 52px);
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid var(--border);
        color: #9a6565;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-weight: 700;
      }

      h1 {
        margin: 18px 0 12px;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(2rem, 5vw, 3.2rem);
        line-height: 1.1;
        letter-spacing: 0.01em;
      }

      p {
        margin: 0 auto;
        max-width: 46ch;
        color: var(--muted);
        font-size: clamp(1rem, 2.7vw, 1.08rem);
        line-height: 1.7;
      }

      .button-wrap {
        margin-top: 28px;
      }

      .button {
        display: inline-block;
        text-decoration: none;
        border: none;
        border-radius: 999px;
        padding: 14px 26px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 12px;
        color: #2a2321;
        background: linear-gradient(120deg, var(--rose-soft) 0%, #f5e3d6 45%, var(--rose) 100%);
        box-shadow: 0 10px 24px rgba(200, 143, 143, 0.3);
        transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      }

      .button:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(200, 143, 143, 0.36);
        filter: brightness(1.03);
      }

      .button:active {
        transform: translateY(0);
      }

      .footer-note {
        margin-top: 22px;
        font-size: 0.9rem;
        color: #887975;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="card">
      <span class="badge" id="badge-text">SvetArt Beauty Studio</span>
      <h1 id="title-text">Booking Confirmed!</h1>
      <p id="body-text">
        Thank you for booking with us. We are excited to welcome you and make your visit feel beautiful from the moment you arrive.
      </p>

      <div class="button-wrap">
        <a class="button" id="home-link" href="/">Return to Home</a>
      </div>

      <p class="footer-note" id="footer-text">If you need to update your appointment, contact us anytime.</p>
    </main>

    <script>
      (function () {
        var translations = {
          en: {
            title: 'Booking Confirmed!',
            body: 'Thank you for booking with us. We are excited to welcome you and make your visit feel beautiful from the moment you arrive.',
            cta: 'Return to Home',
            footer: 'If you need to update your appointment, contact us anytime.',
            pageTitle: 'Booking Confirmed | SvetArt Beauty Studio',
            pageDescription: 'Thank you for booking with SvetArt Beauty Studio. Your appointment is confirmed.'
          },
          ro: {
            title: 'Rezervare Confirmată!',
            body: 'Îți mulțumim pentru rezervare. Abia așteptăm să te întâmpinăm și să facem vizita ta frumoasă din primul moment.',
            cta: 'Înapoi la Acasă',
            footer: 'Dacă vrei să modifici programarea, contactează-ne oricând.',
            pageTitle: 'Rezervare Confirmată | SvetArt Beauty Studio',
            pageDescription: 'Îți mulțumim că ai rezervat la SvetArt Beauty Studio. Programarea ta este confirmată.'
          },
          ru: {
            title: 'Запись Подтверждена!',
            body: 'Спасибо за запись. Мы будем рады вас встретить и сделать ваш визит прекрасным с первых минут.',
            cta: 'Вернуться На Главную',
            footer: 'Если нужно изменить запись, свяжитесь с нами в любое время.',
            pageTitle: 'Запись Подтверждена | SvetArt Beauty Studio',
            pageDescription: 'Спасибо за запись в SvetArt Beauty Studio. Ваша запись подтверждена.'
          }
        };

        var params = new URLSearchParams(window.location.search);
        var queryLang = params.get('lang');
        var savedLang = localStorage.getItem('svetart_lang');
        var lang = 'en';

        if (queryLang === 'en' || queryLang === 'ro' || queryLang === 'ru') {
          lang = queryLang;
        } else if (savedLang === 'en' || savedLang === 'ro' || savedLang === 'ru') {
          lang = savedLang;
        }

        localStorage.setItem('svetart_lang', lang);
        document.documentElement.lang = lang;

        var t = translations[lang];
        document.title = t.pageTitle;

        var descriptionMeta = document.querySelector('meta[name="description"]');
        if (descriptionMeta) {
          descriptionMeta.setAttribute('content', t.pageDescription);
        }

        var titleEl = document.getElementById('title-text');
        var bodyEl = document.getElementById('body-text');
        var ctaEl = document.getElementById('home-link');
        var footerEl = document.getElementById('footer-text');

        if (titleEl) titleEl.textContent = t.title;
        if (bodyEl) bodyEl.textContent = t.body;
        if (ctaEl) ctaEl.textContent = t.cta;
        if (footerEl) footerEl.textContent = t.footer;
      })();
    </script>
  </body>
</html>
